[coverage:report]
include = src/*

[flake8]
ignore =
    # whitespace before ':', let formatter control that
    E203,
    # long lines, let formatter control that
    E501,
    # line break around operator, let formatter control that
    W503
include = src
copyright-check = true
copyright-min-file-size = 1

[tool:pytest]
filterwarnings =
    ignore:.*:DeprecationWarning
    ignore:numpy.ufunc size changed, may indicate binary incompatibility. Expected 192 from C header, got 216 from PyObject:RuntimeWarning

markers =
    slowtest: marks tests as slow

[tool:isort]
profile = black
known_first_party = use_*
force_grid_wrap = 2
