Retention=90

; 
; Storage cache subsystem
;
; The Storage cache contains the fingerprints of all segments on Storage
; and of all DOs in the database.
;
; This cache is used to determine if the CR already has a certain
; DO or segment.
; 
[Cache]

; To minimize memory allocation and deallocation overhead, the cache
; pre-allocates slabs of memory and breaks them up into nodes itself.
; This value specifies the size of each slab of nodes.
; A single node occupies 30 bytes on a 32-bit system and 38 bytes on
; a 64-bit system. Every slab has 4 bytes overhead on a 32-bit system
; and 8 bytes overhead on a 64-bit system.
; The minimum allowed value is therefore 34 on 32-bit systems, and 46
; on 64-bit systems, resulting in one node per slab. However, this is
; highly inefficient. We recommend to use at least 1 Mib per slab.
; Possible suffixes are:
; B, KiB (1024), MiB, GiB, TiB, PiB, EiB, KB (1000), MB, GB, TB, PB, EB.
; @restart
AllocationUnitSize=2MiB

; The following value specifies the number of top level entries in the main
; cache. This number is (2^Bits). Increasing this value improves cache
; performance (unless the machine starts swapping), at the expense of extra
; memory usage. Minimum value is 16, maximum value = 48.
; Default value is 0, which makes the cache automatically derive a value
; from the maximum memory usage specified in section [Cache], entry
; MaxCacheSize.
; @restart
; @validate [0-9]+
Bits=0

; The number of cache partition.
; @restart
; @validate [0-9]+
CachePartitionNum=64

; If we may lock pages in memory
; @restart
LockPages=true

; Specify the maximum size in bytes of the cache here. This value should
; be a multiple of AllocationUnitSize to avoid waste of memory.
; If not specified, no maximum size is enforced.
; Possible suffixes are:
; B, KiB (1024), MiB, GiB, TiB, PiB, EiB, KB (1000), MB, GB, TB, PB, EB, %.
; If the value is expressed as a percentage, it will be based on total system
; memory, swap space excluded.
; @restart
MaxCacheSize=50%

; The following value specifies the number of nodes that can be deleted
; before the Cache Manager starts reclaiming the memory used by these nodes.
;
; Under normal circumstances the Cache Manager will not need to reclaim
; wasted memory since deleted nodes are placed on a free list and will be
; re-used automatically.
;
; Note that:
; - reclaiming unused memory can take a considerable amount of time and will
;   render the cache unavailable for the duration of the process;
; - a value equal to or smaller than 1 will disable cache pruning;
; - maximum value is 2 billion (but you'll run out of memory long before
;   that value is reached);
; @reload
; @validate [0-9]+
MaxWastedSpace=500000

; This specifies cache locking behavior during initial load. When the
; cache is loaded, it is necessary to lock the cache. If
; this value is zero, the cache will remain locked until the load
; completes. While this is the fastest way to update the cache, it
; will prevent cache access from other sources (e.i., all tasks will
; block) until the load is completed. This option allows you to
; specify the number of nodes that can be checked in a single cache
; lock set/release operation. While this slows down cache loading,
; it provides cache access to other sources during load.
; A very small value will cause no noticeable delay but significantly
; increases load times while a large value can cause a noticeable
; delay but faster load times.
; @reload
; @validate [0-9]+
Yield=500

;
; Spooler subsystem
;
; The Spooler subsystem receives DOs and segments from client agents and
; writes information about these objects to the storage and the queue.
; The information in the queue is later moved into the CR database.
; The Spooler subsystem also enqueues incoming requests for removal of
; DOs and segments.
;
; In addition, the Spooler subsystem monitors the amount of free space and
; prevents that the Content Router can completely fill up.
;
[Spooler]

; The following value specifies the number of top level entries in the spooler
; cache of the open tlog file. This number is (2^Bits). Increasing this value
; improves cache performance (unless the machine starts swapping), at the
; expense of extra memory usage. Minimum value = 0 (one single entry),
; maximum value = 28.
; @restart
; @validate [0-9]+
Bits=16

; Enable system wide sync. This may or may not help backup performance.
; The default is 0 (disabled). Whether enable or disable this does not
; affect content router data integrity
; @reload
; @validate [0-9]+
EnableSync=0

; If the free disk space falls below the low space threshold on the storage,
; queue and/or database partitions, the CR will no longer permit store tasks
; to add new data to the CR and will issue an error to the SPA.
; A value higher than the WarningSpaceThreshold will be treated as equal to
; the WarningSpaceThreshold.
; The default value is 4%. Value 0 disables this threshold (NOT recommended).
; Possible suffixes are:
; B, KiB (1024), MiB, GiB, TiB, PiB, EiB, KB (1000), MB, GB, TB, PB, EB, %.
; @restart
LowSpaceThreshold=4%

; Maximum allowed size of a spool file in MB.
; Minimum value is 25, maximum is 65536, default is 65536.
; @restart
; @validate [0-9]+
MaxFileSize=65536

; Specifies maximum number of transactions to be stored in a single
; spooler transaction log. Minimum is 1000, maximum 2147483647
; @restart
; @validate [0-9]+
MaxTransactions=1000000

; Number spooler transaction
; Spooler transactions will be committed seperately
NumSpoolerContext=64

; Master Spool location
; @readonly
Path=/mnt/msdp/vol0/spool

; Let the spooler check disk space after every given number of bytes.
; A value of 0 will disable this trigger. Default value is 256Mib.
; Possible suffixes are:
; B, KiB (1024), MiB, GiB, TiB, PiB, EiB, KB (1000), MB, GB, TB, PB, EB.
; @restart
SizeCheckDataInterval=256Mib

; Let the spooler check disk space after every given number of entries.
; A value of 0 will disable this trigger. Default value is 1024.
; @restart
; @validate [0-9]+
SizeCheckEntryInterval=1024

; The enabled system wide sync from above is triggered by the amount of data
; written to spool area. If the value is greater than zero, it overrules the
; setting for SyncIntervalInSecond. If it is zero, it gives the chance for 
; SyncIntervalInSecond to trigger the sync. The default is 128 (MB)
; @reload
; @validate [0-9]+
SyncIntervalInMB=128

; The enabled system wide sync from above is triggered by a timer. If 
; SyncIntervalInMB is not zero, this setting has no effect. The default
; value is 2 (seconds)
; @reload
; @validate [0-9]+
SyncIntervalInSecond=2

; The maximum number of seconds that a .tlog file can be open before it is
; committed automatically by the spooler manager. If set to 0, the Spooler
; Manager never closes a .tlog file automatically. If not specified, the
; default value of 60 seconds (1 minutes) is used.
; @restart
; @validate [0-9]+
Timeout=60

; If the very low space threshold is reached on the queue partition, the queue
; must be prevented from being filled completely with reroute commands or with
; dereference commands from a client application. This is done by not allowing
; these operations if there are more than a specified number of tlogs in the
; queue. The default value is 5, which is also the minimum. Use value 0 to
; disable this limit (NOT recommended).
; @restart
; @validate [0-9]+
VeryLowSpaceMaxTlogs=5

; If the free disk space falls below the very low threshold on the storage,
; queue and/or database partitions, the CR will no longer permit store tasks
; to add new data to the CR and will issue a critical error to the SPA.
; A value higher than the LowSpaceThreshold will be treated as equal to
; the LowSpaceThreshold.
; The default value is 3%. Value 0 disables this threshold (NOT recommended).
; Possible suffixes are:
; B, KiB (1024), MiB, GiB, TiB, PiB, EiB, KB (1000), MB, GB, TB, PB, EB, %.
; @restart
VeryLowSpaceThreshold=3%

; If the free disk space falls below the warning threshold on the storage,
; queue and/or database partitions, the CR will issue a warning to the SPA.
; The default value is 5%. Value 0 disables this threshold (NOT recommended).
; Possible suffixes are:
; B, KiB (1024), MiB, GiB, TiB, PiB, EiB, KB (1000), MB, GB, TB, PB, EB, %.
; @restart
WarningSpaceThreshold=5%

;
; Storage subsystem
;
; The Storage subsystem processes the entries that are waiting in the queue
; and updates Storage and the CR database with them, both to add and remove
; DOs and segments.
;
[StorageDaemon]

; Max reference operation items to be processed in a batch
; Higher value of this parameter will give high CRQP performance,
; but it costs more memory.
; @reload
; @validate [0-9]+
CRQPBatchRefOpCount=40000000

;
; This setting is present for backward compatibility for systems
; upgraded from PureDisk 6.2.
;
; The following two entries define how data is laid out on the backend
; storage. Data is organized as follows:
; <storage root>/<container>/<container>/.../<endpoint container>/<data>
;
; Data is only stored in endpoint containers. An endpointer container
; will always start with an underscore.
;
; The DMax value defines how many containers can exist inside another
; container.
;
; The FMax value defines how many data files can exist inside an endpoint
; container.
;
; Both values are only used at creation time and should be chosen such
; that the resulting inode size for each container equals that of the
; fundamental filesystem block size. This allows for the fastest possible
; sustained filesystem performance.
;
; The defaults are such that the inode size on a fully populated container
; is 4k bytes.
;
; For optimum performance, FMax should be set to ((DMax * 2) - 1).
;
; Also note that the storage daemon uses extended attributes which the
; filesystem MUST support.
;
; @readonly
DMax=126

; When there are too many references on a DO record in the content router
; database, then we assume that this DO record will never be removed from the
; content router anymore.  We exploit this by converting all the existing
; references to an "eternal reference" that is not removed ever from the record.
; We convert references to an eternal reference when the total number of the
; existing references on the record exceeds the EternalCountThreshold.  The
; default threshold value is 8192.  Warning: it is very DANGEROUS to lower this
; threshold without thorough analysis.  If it is too low, all data in the content
; router will irrevocably be stored permanently and data removal will be blocked.
; The minimum value is 1000 references.
; 
; @reload
; @validate [0-9]+
EternalCountThreshold=8192

; When there are too many references on a DO record in the content router
; database, then we assume that this DO record will never be removed from the
; content router anymore.  We exploit this by converting all the existing
; references to an "eternal reference" that is not removed ever from the record.
; We convert references to an eternal reference when the total size of the
; existing references on the record exceeds the EternalSizeThreshold.  The
; default threshold value is 128 KiB.  Warning: it is very DANGEROUS to lower this
; threshold without thorough analysis.  If it is too low, all data in the content
; router will irrevocably be stored permanently and data removal will be blocked.
; The minimum value is 16 KiB.
; 
; @reload
EternalSizeThreshold=128Kib

;
; This setting is present for backward compatibility for systems
; upgraded from PureDisk 6.2.
;
; @readonly
FMax=251

; where to keep segment and dataobjects log files
; @readonly
HistoryPath=/mnt/msdp/vol0/history

; Keep processed .bin files or not. If set to true, the Storage Daemon moves
; the .bin files to the directory indicated by the ProcessedPath setting.
; If set to false, the Storage Daemon deletes the .bin files instead.
; @reload
KeepProcessedBin=false

; Keep processed .tlog files or not. If set to true, the Storage Daemon moves
; the .tlog files to the directory indicated by the ProcessedPath setting.
; If set to false, the Storage Daemon deletes the .tlog files instead.
; @reload
KeepProcessedTlog=false

; The minimum reroute duration in hours.
; For performance reasons (mainly random disk access), queue processing and
; rerouting do not run simultaneously.
; Only after rerouting has run for the duration specified here has
; been exceeded, rerouting gives precedence to pending queue processing.
; This guarantees that rerouting can make progress on a system that needs
; more free space for incoming backups even if the CR is continuously
; requested to process its queue.
; Default value is 6 hours.
; Maximum allowed value is 24 hours.
MinRerouteDuration=6

; storaged input path location
; @readonly
Path=/mnt/msdp/vol0/queue

; Enable performance statistics logging by the Storage Manager. The statistics
; will be logged in the log file of the Storage Manager, usually
; "/Storage/log/spoold/storaged.log". The log lines have loglevel INFO and
; start with the word 'Performance'. The default value is false.
PerformanceStats=false

; storaged processed tlog location
; @readonly
ProcessedPath=/mnt/msdp/vol0/processed

;
; The maximum allowed age of the queue in days. If this is exceeded, a job to
; start processing is created on the Storage Pool Authority.
; This is a safeguard in case the Storage Pool Authority does not schedule jobs
; frequently enough. Default value is 7.
; @reload
; @validate [0-9]+
QueueProcessingMaximumQueueAge=7

; If the local queue processing delay becomes larger than the specified critical
; level, the CR sends warning events to the SPA and stops accepting new backup
; data until the queue processing delay returns to a value below the level again.
; It is important that the delay does not become too large, because it causes
; actual deletion of data from storage after data removal to be delayed, and
; storage can become full.
; The specified value should be greater than or equal to the RetentionWarningLevel.
; The critical level is in days. Default is 30 days.
; @reload
; @validate [0-9]+
RetentionCriticalLevel=10

; A margin for the retention period of spooler tasks. This is added to the
; storagepool-wide retention period as retrieved from the SPA.
; If the CR is the only CR in the storage pool and owns all DOs and SOs,
; the CR automatically uses a retention period of 0 and this margin is ignored.
; The retention margin is in days. Default is 2 days. Lower values are
; dangerous and should not be used in production environments. Higher values
; potentially postpone actual deletion of data from storage after data removal.
; @readonly @reload
RetentionMargin=2

; The CR reports the local queue processing delay to the SPA and the retrieves
; the storagepool-wide retention period from the SPA.
; If the CR is the only CR in the storage pool and owns all DOs and SOs,
; the CR automatically uses a retention period of 0.
; The refresh interval is in seconds. Default value is 1 hour (3600 seconds).
; Minimum value is 5 minutes (300 seconds). Maximum value is 12 hours (43200 seconds).
; @reload
; @validate [0-9]+
RetentionRefreshInterval=3600

; If the local queue processing delay becomes larger than the specified warning
; level, the CR sends warning events to the SPA.
; It is important that the delay does not become too large, because it causes
; actual deletion of data from storage after data removal to be delayed, and
; storage can become full.
; The specified value should be greater than the RetentionMargin.
; The warning level is in days. Default is 10 days.
; @reload
; @validate [0-9]+
RetentionWarningLevel=3

;
; The storage manager checks from time to time how long its sessions to
; other content routers are open. If they are open for longer than the
; number of seconds specified below, it ends them.
;
; Sessions need to be closed every now and then (event if they were
; recently used) to end the protection on the DOs and SOs by the taskid
; of the session, so that the objects can be garbage collected if desired.
;
; Minimum allowed value is 60 seconds (one minute).
; Maximum allowed value is 86400 seconds (one day).
;
; @reload
; @validate [0-9]+
SessionTimeout=3600

;
; Sort limits. A comma-separated list of:
; - The maximum number of objects to sort in memory at a time.
;   The minimum allowed value is 100000.
; - The maximum size of the combined objects to sort in memory at a time.
;   The minimum allowed value is 4MiB.
; - the number of intermediate files to merge into one at a time
; - buffer size per file (used for intermediate files)
; Default value is 1000000,64MiB,8,1MiB.
; @reload
SortLimits=1000000,64MiB,8,1MiB

; location of our storage
; @readonly
Storage=/mnt/msdp/vol0/data

; where to store temporary files
; @readonly
TmpPath=/mnt/msdp/vol0/tmp

; 
; This setting is present for backward compatibility for systems
; upgraded from PureDisk 6.2.
;
; Whether or not extended attributes can be used (if available)
; @readonly
UseExtendedAttributes=1

;
; Storage Database subsystem
;
[StorageDatabase]

;
; --- Common Settings for all database types ---
;
; When to commit pending transactions. Note that commits are always
; performed when a spooler log has been processed. Minimum allowed value is 1
; If set to auto, the application will decide when to commit.
; @restart
; @validate [0-9]+
CommitInterval=1024

; Name of database to connect to
; @readonly @restart
db=crdb

;
; --- PostgreSQL specific settings ---
;
; IP address/hostname of database server
; Use /tmp for communication via unix-domain socket
; Use 127.0.0.1 for communication via TCP
; Typically, unix-domain socket is up to 20% faster than TCP
; @readonly @restart
Host=eagappflx027-msdp01.engba.veritas.com

; Maximum no of times to retry a failed lock attempt
; @readonly
LockRetry=12

; Maximum no of seconds to wait on database lock release
; @readonly
LockTimeout=5

; Password for user
; @readonly @restart
Pass=pdepddbpwd

; The location of the Storage database on disk. This information is needed for
; free disk space checking. If this entry is not filled in or empty, disk space
; checking for the database is disabled.
; @readonly @restart
Path=/mnt/msdp/vol0/databases

; Portnumber of the listener
; @readonly @restart
Port=10085

; Cursor search prefetch value. This values specifies how many
; items to prefetch during cursor operations. A value of 1 or lower
; disables prefetching. No maximum value.
; @restart
; @validate [0-9]+
Prefetch=1024

; Type of database. Only used during creation time. Specify
; one of hash (for a hash-based database), btree (for a btree-based db)
; postgres (default) or mysql (not yet supported)
; @readonly
Type=postgres

; User to use
; @readonly @restart
User=pddb

;
; Monitor Subsystem Configuration
;
; The monitor subsystem monitors global system resources and, if
; instructed to do so, can suspend operations of the DCT Content Router.
;
; The monitoring process uses threshold values to decide what to do.
;
; Threshold values are specified as follows:
;
; subsystem=<Info Level> <Notice Level> <Warning Level> <Suspend Level> <Repeat>
;
; Repeat       : This value specifies the number of times a threshold must
;                be exceeded before a message is issued. The minimum value is 1.
;
;                If the specified value is positive, the first message is
;                issued when a threshold is first exceeded.
;                If the specified value is negative, the first message is
;                issued after a threshold has been exceeded <repeat> times.
;
; Info-level   : when exceeded, monitor will issue a single Info message
;                It will not issue any additional Info messages when the
;                usage stays above this threshold and it will not issue
;                an Info message when the usage falls below the threshold.
; Notice-level : monitor will issue a Notice message when the threshold is
;                exceeded and the last message was issued <Repeat> messages
;                ago. A message will be sent when the usage falls below
;                the threshold.
; Warning-level: monitor will issue a Warning message each time this
;                threshold is exceeded and the last message was issued
;                <Repeat> messages ago. A message will be sent when the usage
;                falls below the threshold.
; Suspend-level: monitor will issue an Error message each time this threshold
;                value is exceeded and the last Error message was issued
;                <Repeat> messages ago.
;                It will also lead to suspension of the spooler service.
;                Spooler service will be resumed once the usage falls below
;                the first preceding level that has a non-zero value.
;                If all preceding levels are zero, service will be resumed
;                if usage falls below the specified suspend level.
;                The recommended value for suspend-level is 0.
;
; An zero value for a given level will skip the check for that level.
; (disabling a subsystem check: specify 0 0 0 0 0).
;
; Equal values for levels will only cause monitoring for the highest
; level, e.i., specifying 50 50 50 70 1 will only enable Warning and Suspend
; checks.
;
[Monitor]

; CPU thresholds, across all available processors.
; The default is for this condition to occur at least 45 times in a row
; (hence the negative repeat count!). Due to spikes in processing requests,
; using a low repeat value can cause a lot of false alarms.
; @reload
MaxCPU=99 0 0 0 -45

;
; Subsystem threshold configuration
;
; Memory thresholds in percentage of total system memory (real + swap)
; @reload
MaxMem=70 80 85 0 10

; Monitor polling interval in seconds. This specifies how often the monitor
; should perform a health check. The minimum is 0 (will disable monitoring),
; the default is 60. No maximum value.
; @reload
; @validate [0-9]+
PollInterval=60

; Monitor reporting interval. This specifies how often the monitor should
; generate a report on resource usage. This minimum value is 0 (disable
; reporting). No maximum value. Default specification is minutes.
; Possible suffixes are s(seconds), m(inutes), h (ours) or d(ays)
; Default is minutes. The specified value is always rounded to be a 
; multiple of the PollInterval.
; @reload
ReportInterval=30m

; Storage thresholds, in percentage of total storage available
; Disabled. Do not use; this setting interferes with disk space checking
; by the Spooler subsystem.
; @reload
Storage=0 0 0 0 0

;
; Remote Control subsystem
;
; Access is controlled via various configuration settings in this section.
;
; Control authentication is checked against the LOCAL user database.
;
; If both users and groups lists are empty, any user that supplies a correct
; login/password combination is allowed control access.
;
; If users is empty but groups is not, only members of the specified group(s)
; are allowed control access.
;
; If groups is empty but users is not, only specified user(s) are allowed
; control access.
;
; Setting either Users or Groups to none will effectively disable all but
; guest/root login attempts.
;
; The guest account is a special account: if set, any connection using the
; specified user name (which does not need to exist in the local user database)
; is granted read-only access.
;
[Control]

; Whether or not remote control is possible
; @readonly
Active=true

; Whether or not to allow root login
; @readonly
AllowRoot=false

; Comma-separated list of allowed user group(s)
; Set to empty if you want all groups to have access
; Set to none if you want to disallow all groups
; @readonly
Groups=none

; Name of guest account to be used. Guest access is read-only. Set to empty
; if you want to disable guest access
; @readonly
Guest=demouser

; Comma-separated list of IP addresses (in the form A.B.C.D/M) that are
; allowed to perform control actions on this system (IP-based authentication)
; You can specify shortcuts if you want, e.i., 127/8 equals 172.0.0.0/8
; Leave empty if you want all systems to have access.
; @readonly
IPRange=

; Whether or not to enable read-write access
; @readonly
ReadWrite=false

; Comma-separated list of user names to are allowed to perform remote control
; actions.
; Leave empty if you want all users to have access
; Set to none if you want to disallow all users
; @readonly
Users=none

;
; SSL Configuration
;
; All connections to the Content Router make use of SSL.
;
[SSL]

; Location of the content router certificate
; @readonly
CertFileName=/mnt/msdp/vol0/var/keys/spoold.cert

; Location of the content router private key
; @readonly
PrivateKeyFileName=/mnt/msdp/vol0/var/keys/spoold.key

;
; Container based CR Data Store
;
[CRDataStore]

;The valid time of the datacontainer in the full cache ,the unit is day, it should be integer
CacheValidTime=365

; Check storage busy interval.
; @reload
CheckStoreBusyInterval=20

;The number of containers in a round of compaction 
; Default value is 100
; @reload
CompactBatchNum=400

; The threshold triggers compaction when the percentage of the free disk space
; reaches this threshold even if the data store is busy. 
; If free disk space percentage is greater than this threshold, 
; compaction will not work when the data store is busy.
; Default value is 10%.
; @reload
CompactFreeSpaceThreshold=10%

; During the process of choosing containers for cross-container compaction, this
; threshold is used to filter out the containers whose deleted space is less
; than this value. This lower bound is set for performance reason.
; The default value is 16Mib
; @reload
CompactLBound=16Mib

; This threshold is used to filter out the containers whose container is less
; than this value. This lower bound is set for performance reason.
; The default value is 32Mib
; @reload
CompactSizeLBound=32Mib

; The threshold triggers self-compaction if the percentage of deleted space
; in a container reaches this threshold. This self-compaction can happen even
; the total logical deleted space/logical stored space has not reached DeleteSpaceThreshold.
; Default value is 80%.
; @reload
CompactThreshold=80%

; Compaction thread wakes up periodically with this time interval (in seconds)
; The default value is 20 seconds
; @reload
; @validate [0-9]+
CompactWakeupInterval=20

; This parameter gives users the change the hash table size of container index header.
; higher value of this parameter gives lower resource conflict, but costs more memory.
; preferred value: 10000 ----  1000000
; @restart
; @validate [0-9]+
DCHeaderHashSize=500000

; Enable or disable compaction candidate check.
; @reload
EnableCompactCandidateCheck=true

; This parameter indicates if we load all containers into main index cache,
; including compacted and fixed corrupt containers.
; @restart
LoadAllContainers=true

; This parameter indicates the algorithm for load balance
; 0 ----  disable load balance
; 1 ----  default load balance(by capacity and throughput)
; 2 ----  load balance by number of source ID
; default value: 1(default load balance algorithm)
; @restart
LoadBalanceAlgorithm=2

; This parameter indicates the interval to take action for load balance
; This parameter doesn't impact algorithm 2
; default value: 86400 seconds (1 day)
; @restart
LoadBalanceInterval=86400

; This parameter controls the memory buffer size used by data store writes
; and compaction. Be aware that a bigger memory buffer does not always mean
; a better write performance. The default value is 16Mib.
; @restart
MaxBufSize=32Mib

; Container size. Once it is set, it should not be changed 
; to be smaller to avoid unexpected behaviors
; @restart @readonly
MaxFileSize=64Mib

; This parameter determines the maximum number of caches used to hold
; container index records. These cache entries improve data store read
; performance (data restore). LRU policy is used for cache replacement.
; The default value is 1024.
; @restart
; @validate [0-9]+
MaxNumCaches=1024

; The maximum number of entries could be buffered in one data store buffer 
; before writing to container. If the size of majority SO/DO is small, this 
; should be set higher. Higher values consume more memory. Default value is 
; 5000.
; @restart
; @validate [0-9]+
MaxNumEntriesForOneBuf=5000

; The maximum number of SO/DO can be put into one data store container.
; The default is 50000 
; @reload
; @validate [0-9]+
MaxNumEntriesForOneContainer=50000

; Maximum number of containers in data store. Default value 0 will let data
; store do the calculation based on storage capacity and container size.
; Default value is 0.
; @restart @readonly
; @validate [0-9]+
MaxNumFiles=0

; This parameter together with MaxBufSize determines the total memory buffer
; used for data store writes. Be aware that a bigger number of buffers does
; not always mean a better write performance. The default value is 16.
; @restart
; @validate [0-9]+
MaxNumRecvBufs=8

; This parameter gives users the chance to find a good balance between backup speed
; and restore speed. The higher value of this parameter gives better restore performance
; while lower value of this parameter gives better backup performance. Its actual 
; impact also depends on physical storage performance. The default value is 1024, i.e.,
; 1024 concurrent backup streams will each have their own container to write into.
; 0 will let each backup stream has its own container.
; @restart 
; @validate [0-9]+
NumConWriteFiles=1024

; This parameter indicates the interval to persist source ID map,
; default value: 3600 seconds
; @restart
PersistSourceMapInterval=3600

; the number of threads for segment prefetching
; @restart
; @validate [0-9]+
# TODO: change it back to 8
PrefetchThreadNum=8

; This parameter determines the data store read buffer size, in Bytes. The default value
; is 4194304 (4MB)
; @restart
; @validate [0-9]+
ReadBufferSize=4194304

; Threshold used by compaction to determine if data store is busy in reading
; (number of SO/DO read per second). The default value is 30.
; @reload
; @validate [0-9]+
ReadBusyThreshold=30

; This parameter is also used to measure data locality threshold for a container.
; If the SO count which a DO refers a container is less than RebaseLocalityThreshold,
; all the SO in this container referred by the DO should be rebased.
; if zero is set to RebaseLocalityThreshold, RebaseScatterThreshold works.
; @restart
; @validate [0,2048]
RebaseLocalityThreshold=120

; This parameter is used to indicate the max percentage of SO to be rebased in a DO.
; If this threshold is reached, the remaindering SO will be skipped.
; @restart
RebaseMaxPercentage=5

; This parameter is used to indicate the max time span(in seconds) of SO in a DO.
; If this threshold is reached, the remaindering SO will be skipped.
; @restart
RebaseMaxTime=60

; This parameter is used to indicate the minimum containers which are referred by a DO.
; If the number of referred containers doesn't meet, we don't do rebasing.
; @restart
RebaseMinContainers=20

; This parameter is used to measure data locality threshold for a container.
; If the data size which a DO refers a container is less than RebaseScatterThreshold,
; all the data in this container referred by the DO should be rebased.
; If RebaseLocalityThreshold is not zero, RebaseScatterThreshold is disbaled internally.
; @restart
RebaseScatterThreshold=1MiB

; This parameter indicates if we check container data CRC during initial cache loading.
; @restart
SampledCheckCRC=false

; Stack size for the data store threads. Only modify if you know what you
; are doing. The minimum value is PTHREAD_STACK_MIN (usually 16kb) and the
; maximum is 64Mib. Possible suffixes are b, Kb (1000), Kib (1024), Mb and Mib.
; A a value of zero specifies the system default value (output from ulimit -s
; on most systems).
; @restart
ThreadStackSize=0

; This parameter controls if try to use direct IO when writing container files. 
; Be aware that direct IO does not always mean
; a better write performance.
; @restart
UseDirectIO=true

; Do we need verify writes from backup? The default value is true.
; @reload
VerifyBackupWrite=true

; Do we need verify writes from compaction? The default value is true
; @reload
VerifyCompactionWrite=true

; This parameter is used to specify the size of a VxFS extent, in FS blocks. e.g. if the 
; length of an extent is 256 KB, and the block size is 8 KB, the extent size is 32.
; @reload
VxExtentSize=0

; This parameter determines the data alignment adjustment within container and the chunk
; size used for each write, in Bytes.
; @restart
; @validate [0-9]+
WriteBufferSize=2097152

; the number of threads for writing data to data container
; paralleled writing can improve the performance of IO
; @restart
; @validate [0-9]+
WriteThreadNum=1

;
; Container Reference Database
;
[ReferenceDatabase]

; This parameter is used to determine the size of lock pool for reference databases.
; @restart
LockPoolSize=102400

; This parameter is used to determine the max number of references for a container.
; @restart
MaxDCRefCount=2000

;
; Data Integrity Check configuration
;
[DataCheck]

; This parameter determines the number of containers for CRC check each time.
; @validate [0-9]+
CRCCheckBatchNum=20

; This parameter determines the sleep seconds in CRC check.
; @validate [0-9]+
CRCCheckSleepSeconds=20

; Enable or disable Data Integrity checking in Data Container data file.
EnableCRCCheck=true

; This parameter determines if we stop CR when found data lost in checking.
ShutdownCRWhenError=false

;
; Fibre Channel support
;
[FibreChannel]

; This parameter is used for creating target device(s).
WWNS=

;
; MSDP KMS configuration
; 
; In this part, This part parameters are used for MSDP KMS configuration.
; KeyName is the name of the key which user uses.
; KMSEnable is used to enable or disable MSDP KMS configuration.
; KMSKeyGroupName is key group name.
; KMSServerName is NBU KMS server.
; KMSType is KMS server type. 0 is NetBackup KMS server,  1 is reserved.
;
[KMSOptions]
KMSEnable=false
