; A set of server-side capabilities that must always be enforced or denied,
; regardless of client settings.
;
; It is composed as a list of one or more of the following values:
;
; [no]fast             : always disable/enable fast data transfer mode;
; [no]agent_crypt      : always disable/enable client-side encryption;
; [no]compress         : always disable/enable compression;
; [no]encrypt          : always disable/enable encryption;
; verify_data_write    : enable verification of received data;
; verify_data_read     : enable verification of data reads;
; verify_read_access   : enable extended read security checks;
; verify_add_access    : enable extended write security checks;
; verify_del_access    : enable extended delete security checks;
; verify_so_references : enable SO presence verification for DOs;
;
; Notes:
; - Repeated options are ignored
; - A [no] capability always takes precedence over its counterpart.
; - A [no] capability specifies a capability request that will always be denied,
;   otherwise it will be enforced;
; - If a capability is not set it will be granted if requested by the client.
; - Using verify_data_write can have a considerable effect on store performance
;   If not set, a default set of consistency checks are performed which will 
;   detect transmission errors and changing files. Using this option enables
;   extended verification checks which require the (possible) decryption of
;   received data and computation of the corresponding fingerprint. Use this
;   option if you have clients with buggy hardware;
; - verify_data_read is only effective if noagent_crypt is enabled and can
;   have a considerable impact on restore performance. If not specified (or
;   agent_crypt is used), a cheaper verification always occurs.
; - Using verify_xxx_access can have a slight performance impact on store
;   and/or receive operations since the content router then performs additional
;   security checks on dataobject <-> data selection ownership(s).
; - Using verify_so_references may have a slight performance impact on store
;   operations since the content router then performs additional referential
;   integrity checks for DOs. However, enabling this option is highly
;   recommended because it can help prevent data loss.
;   During rerouting, this option may in exceptional situations cause problems.
;   Such an exceptional situation occurs if routing tables are modified
;   repeatedly during rerouting, in which case some SOs may temporarily be
;   located on a different CR than indicated by recommended and current route
;   table (in this case, the SOs can temporarily not be restored either, until
;   they have been rerouted).
;   If such a situation occurs, this option can temporarily be disabled.
;
; Running tasks will continue with the original value.
; @restart
ServerOptions=verify_so_references,fast

; sessions timeout after this period of inactivity
; @readonly
SessionTimeout=3600

;
; Small file optimization. Files smaller than the specified size (in bytes)
; skip a number of steps that are required for larger files. The given value
; must be smaller than or equal to the segment size. A value of -1 sets the
; value equal to the segment size, while a value of 0 disables small file
; optimization. For optimum performance, the specified value should be smaller
; than the read buffer size.
; The content router does not use this setting, but some of its maintenance
; tools do. This setting does not apply to client agents.
; @validate [0-9]+
SmallFileThreshold=16384

; Number of attempts to setup the initial SPA connection    
