; on most systems).
; Running tasks will continue with the original value.
; @reload
; @validate [0-9]+
TaskThreadStackSize=0

; (don't) send TCP keepalive probes
; Running tasks will continue with the original value.
; @reload
; @validate [0-9]+
TcpKeepalive=1

; TCP Receive Buffer size, used by agent that is using agent-side crypto
